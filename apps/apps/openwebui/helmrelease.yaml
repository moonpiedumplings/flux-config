---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openwebui
  namespace: owui
spec:
  chart:
    spec:
      chart: open-webui
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: openwebui
  interval: 10m0s
  # valuesFrom:
  #   - kind: Secret
  #     name: owui-helm-secrets
  #     valuesKey: values.yaml
  values:
    extraEnvFrom:
      - secretRef:
          name: owui-secrets
          key: OPENAPI_API_KEY
    extraEnvVars:
      - name: ENABLE_PERSISTENT_CONFIG
        value: "True"
      - name: CORS_ALLOW_ORIGIN
        value: "https://chat.moonpiedumpl.ing"
      - name: OLLAMA_BASE_URL
        value: "http://ollama.owui.svc.cluster.local:11434"
      - name: ENABLE_OLLAMA_API
        value: "True"
      - name: ENABLE_OAUTH_SIGNUP
        value: "True"
      - name: ENABLE_OAUTH_PERSISTENT_CONFIG
        value: "False"
      - name: ENABLE_INITIAL_ADMIN_SIGNUP
        value: "False"
      - name: ENABLE_LOGIN_FORM
        value: "False"
      - name: ENABLE_OAUTH_WITHOUT_EMAIL
        value: "True"
      - name: ENABLE_OAUTH_EMAIL_FALLBACK
        value: "True"
      - name: OAUTH_SUB_CLAIM
        value: "preferred_username"
    openaiBaseApiUrl: http://owui-pipelines.owui.svc.cluster.local:9099
    ollama:
      enabled: false
    persistence:
      enabled: true
      existingClaim: openwebui
    pipelines:
      enabled: false
    sso:
      enabled: true
      enableSignUp: true
      enableGroupManagement: true
      groupManagement:
        groupsClaim: groups
      enableRoleManagement: true
      roleManagement:
        rolesClaim: groups
        adminRoles: "admins"
        allowedRoles: "layer8,admins,tester"
      oidc:
        enabled: true
        clientId: chat
        clientExistingSecret: owui-secrets
        clientExistingSecretKey: ssoClientSecret
        providerName: "Authentik"
        providerUrl: "https://idp.moonpiedumpl.ing/application/o/chat/.well-known/openid-configuration"
        scopes: "openid profile email sub"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
  namespace: owui
spec:
  chart:
    spec:
      chart: ollama
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: ollama
  interval: 10m0s
  values:
    persistentVolume:
      enabled: true
      existingClaim: ollama
    gpu:
      enabled: true
      type: 'nvidia'
      number: 1
    runtimeClassName: nvidia
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: owui-pipelines
  namespace: owui
spec:
  chart:
    spec:
      chart: pipelines
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: openwebui
  interval: 10m0s
  values:
    persistence:
      enabled: true
      existingClaim: owui-pipelines
    extraEnvVars:
      - name: PIPELINES_URLS
        value: https://github.com/open-webui/pipelines/blob/main/examples/filters/detoxify_filter_pipeline.py
      - name: PIPELINES_API_KEY
        valueFrom:
          secretKeyRef:
            name: owui-secrets
            key: PIPELINES_API_KEY